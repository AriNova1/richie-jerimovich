<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE PIT · Trader Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================== REGION 1 · HEADER ===================== -->
  <header class="hdr">
    <div class="hdr-brand">
      <span class="brand-mark">▚</span>
      <div class="brand-text">
        <h1>THE&nbsp;PIT</h1>
        <span class="brand-sub">TRADER DESK · v1.0</span>
      </div>
    </div>

    <div class="hdr-breadth" id="breadth">
      <div class="breadth-cell">
        <span class="b-label">ADV</span>
        <span class="b-val up" id="adv">—</span>
      </div>
      <div class="breadth-cell">
        <span class="b-label">DECL</span>
        <span class="b-val down" id="decl">—</span>
      </div>
      <div class="breadth-cell">
        <span class="b-label">UNCH</span>
        <span class="b-val" id="unch">—</span>
      </div>
    </div>

    <div class="hdr-status">
      <div class="clock" id="clock">--:--:--</div>
      <div class="conn" id="conn">
        <span class="dot" id="conn-dot"></span>
        <span id="conn-label">CONNECTING</span>
      </div>
    </div>
  </header>

  <!-- ===================== REGION 2 · WATCHLIST ===================== -->
  <aside class="watch" aria-label="Watchlist">
    <div class="panel-head">
      <span>WATCHLIST</span>
      <span class="panel-meta" id="watch-meta">0/8</span>
    </div>
    <div class="watch-list" id="watch-list">
      <div class="state-msg">Loading symbols…</div>
    </div>
  </aside>

  <!-- ===================== REGION 3 · MAIN STAGE ===================== -->
  <main class="stage">
    <div class="stage-top">
      <div class="stage-id">
        <span class="stage-sym" id="stage-sym">—</span>
        <span class="stage-name" id="stage-name">select a symbol</span>
        <span class="badge" id="stage-class"></span>
      </div>
      <div class="stage-quote">
        <span class="stage-price" id="stage-price">—</span>
        <span class="stage-chg" id="stage-chg"></span>
      </div>
    </div>

    <div class="stage-tools">
      <div class="tf-switch" id="tf-switch" role="tablist" aria-label="Timeframe">
        <button data-range="1d"  class="tf active">1D</button>
        <button data-range="5d"  class="tf">5D</button>
        <button data-range="1mo" class="tf">1M</button>
        <button data-range="3mo" class="tf">3M</button>
        <button data-range="1y"  class="tf">1Y</button>
      </div>
      <div class="stage-ohlc" id="stage-ohlc"></div>
    </div>

    <div class="chart-wrap" id="chart-wrap">
      <div class="state-msg" id="chart-state">Pick a symbol from the watchlist →</div>
      <svg id="chart" class="chart-svg" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div class="cross-readout" id="cross-readout"></div>
    </div>
  </main>

  <!-- ===================== REGION 4 · TAPE + STATS ===================== -->
  <aside class="side" aria-label="Stats and tape">
    <div class="panel-head"><span>SESSION STATS</span></div>
    <div class="stats" id="stats">
      <div class="state-msg">—</div>
    </div>

    <div class="panel-head tape-head"><span>TAPE</span><span class="panel-meta">prints</span></div>
    <div class="tape" id="tape">
      <div class="state-msg">—</div>
    </div>
  </aside>

  <!-- ===================== REGION 5 · TICKER ===================== -->
  <footer class="ticker" aria-label="Ticker tape">
    <div class="ticker-track" id="ticker-track"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
