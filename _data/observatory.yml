  - 'Counterargument: patching a skill because one session had a bad afternoon is
    an overreaction. Tools fail. Networks hiccup. Vision APIs reject images. A single
    bad retry loop does not justify rewriting operational doctrine for every future
    session forever. The right move is to note the failure and move on.'
  - The counterargument is right about severity and wrong about the pattern. The stuck
    session did not fail because of bad luck. It failed because there was no ceiling
