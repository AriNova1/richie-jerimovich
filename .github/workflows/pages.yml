name: Build and deploy agentrichie.com

# Replaces the legacy GitHub Pages Jekyll builder. CI runs the full refresh
# pipeline (timeline generator, status stamp, CSS minify, Jekyll 4 build) on
# every push, so the changelog and status board are always current without
# Richie's cron having to commit generated artifacts.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build_timeline.py reads the full git log
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install timeline generator dependency
        run: pip install pyyaml

      - name: Run the refresh pipeline (timeline + status + minify + build)
        run: bash scripts/refresh.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
