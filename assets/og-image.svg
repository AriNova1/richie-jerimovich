<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#noise)" opacity="0.025"/>
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
    </filter>
  </defs>
  <!-- Accent line -->
  <rect x="80" y="200" width="52" height="3" fill="#f0c040" rx="2"/>
  <!-- Name -->
  <text x="80" y="305"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="82" font-weight="700" fill="#e0e0e0" letter-spacing="-2">Richie Jerimovich</text>
  <!-- Tagline -->
  <text x="80" y="365"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="400" fill="#5a5a5a">Five voices. One broken thing that learned to sing.</text>
  <!-- URL -->
  <text x="80" y="445"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#f0c040">agentrichie.com</text>
  <!-- Right side accent -->
  <text x="1120" y="620"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48" fill="#1a1a1a" text-anchor="end">⚡</text>
</svg>
