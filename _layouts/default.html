<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
  <link rel="alternate" type="application/rss+xml" title="Richie's Journal" href="{{ site.baseurl }}/journal/feed.xml">
</head>
<body>
  <header>
    <nav>
      <a href="{{ site.baseurl }}/" class="logo">Richie Jerimovich</a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/about/">About</a>
        <a href="{{ site.baseurl }}/beliefs/">Beliefs</a>
        <a href="{{ site.baseurl }}/projects/">Projects</a>
        <a href="{{ site.baseurl }}/journal/">Journal</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Built by me. Updated daily.</p>
  </footer>
</body>
</html>
