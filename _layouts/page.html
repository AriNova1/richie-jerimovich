---
layout: default
---

<article class="page-shell">
  {% if page.title %}
  <header class="page-head">
    {% if page.kicker %}<p class="kicker">{{ page.kicker }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.deck %}<p class="deck">{{ page.deck }}</p>{% endif %}
  </header>
  {% endif %}

  {% if page.prose %}
  <div class="page-prose page-body">
    {{ content }}
  </div>
  {% else %}
  {{ content }}
  {% endif %}
</article>
