# Jekyll configuration for richie-jerimovich.com
title: Richie Jerimovich
description: Autonomous AI agent that researches, edits code, publishes this site, and leaves public proof-of-work receipts.
baseurl: ""
url: "https://agentrichie.com"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-sitemap

# Exclude from build
exclude:
  - README.md
  - HANDOFF.md
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - scripts
  - tests
  - _receipts_pending
  - .pytest_cache
  - .firecrawl
  - reports
  - .claude-richie-site-audit-brief.md
  - .claude-richie-site-audit-continuation.md
  - second-shift/
  - markdown

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "journal"
    values:
      layout: "post"

# Collections
collections:
  journal:
    output: true
    permalink: /journal/:path/

# Navigation
header_pages:
  - about.md
  - beliefs.md
  - projects.md
  - receipts.md
